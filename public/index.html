<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Moje Portfolio</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Portfolio">
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#0b1220; --card:#141d31; --card2:#1b2740; --line:#243352;
    --text:#e8edf7; --muted:#8b97b1; --faint:#5b6884;
    --up:#3ddc97; --down:#ff6b6b; --accent:#5b8cff; --gold:#f5b941;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:15px; overscroll-behavior-y:contain}
  .num{font-variant-numeric:tabular-nums}

  header{position:sticky; top:0; z-index:20; background:rgba(11,18,32,.85);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    padding:calc(env(safe-area-inset-top) + 12px) 16px 10px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--line)}
  header h1{font-size:17px; margin:0; font-weight:700; letter-spacing:.2px}
  #refreshInfo{font-size:11px; color:var(--faint)}
  #refreshInfo.spin::before{content:'⟳ '; display:inline-block; animation:rot 1s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}

  main{padding:14px 14px calc(env(safe-area-inset-bottom) + 84px); max-width:760px; margin:0 auto}

  .tabbar{position:fixed; left:0; right:0; bottom:0; z-index:30;
    display:flex; background:rgba(13,20,36,.92); backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px); border-top:1px solid var(--line);
    padding:6px 4px calc(env(safe-area-inset-bottom) + 6px)}
  .tabbar button{flex:1; background:none; border:none; color:var(--faint);
    font-size:10px; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:4px 0; cursor:pointer; font-family:inherit}
  .tabbar button .ico{font-size:20px; line-height:1}
  .tabbar button.active{color:var(--accent)}

  .card{background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:16px; margin-bottom:14px}
  .card h3{margin:0 0 12px; font-size:15px; font-weight:700}
  .label{font-size:12px; color:var(--muted); margin-bottom:2px}
  .big{font-size:34px; font-weight:800; letter-spacing:-.5px}
  .up{color:var(--up)} .down{color:var(--down)}
  .pill{display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:99px}
  .pill.up{background:rgba(61,220,151,.14)} .pill.down{background:rgba(255,107,107,.14)}
  .muted{color:var(--muted)} .small{font-size:12px} .tiny{font-size:11px}

  .row{display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:11px 0; border-bottom:1px solid var(--line); cursor:pointer}
  .row:last-child{border-bottom:none}
  .row .l{min-width:0}
  .row .sym{font-weight:700; font-size:14px}
  .row .name{font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:46vw}
  .row .r{text-align:right; flex-shrink:0}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .stat .label{margin-bottom:1px}
  .stat .v{font-size:14px; font-weight:600}

  .seg{display:flex; background:var(--card2); border-radius:10px; padding:3px; gap:3px; margin-bottom:12px}
  .seg button{flex:1; border:none; background:none; color:var(--muted); font-size:12px;
    font-weight:600; padding:7px 0; border-radius:8px; cursor:pointer; font-family:inherit}
  .seg button.active{background:var(--accent); color:#fff}

  .btn{display:block; width:100%; border:none; border-radius:12px; padding:13px;
    font-size:15px; font-weight:700; cursor:pointer; font-family:inherit}
  .btn.primary{background:var(--accent); color:#fff}
  .btn.danger{background:rgba(255,107,107,.14); color:var(--down)}
  .btn.ghost{background:var(--card2); color:var(--text)}
  .btn:disabled{opacity:.45}
  .iconbtn{background:var(--card2); border:1px solid var(--line); color:var(--text);
    border-radius:10px; width:34px; height:34px; font-size:18px; cursor:pointer; line-height:1}

  input,select{width:100%; background:var(--card2); border:1px solid var(--line);
    border-radius:10px; color:var(--text); padding:12px; font-size:15px; font-family:inherit;
    margin-bottom:10px; -webkit-appearance:none; appearance:none}
  input:focus,select:focus{outline:none; border-color:var(--accent)}
  label.f{display:block; font-size:12px; color:var(--muted); margin-bottom:4px}

  .modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:50;
    display:flex; align-items:flex-end; justify-content:center}
  .modal{background:var(--card); border:1px solid var(--line); border-radius:20px 20px 0 0;
    width:100%; max-width:640px; max-height:88vh; overflow-y:auto;
    padding:18px 18px calc(env(safe-area-inset-bottom) + 18px)}
  .modal h2{margin:0 0 14px; font-size:18px}
  .modal .close{float:right; background:none; border:none; color:var(--muted);
    font-size:22px; cursor:pointer; margin:-4px -4px 0 0}

  .empty{text-align:center; color:var(--muted); padding:44px 20px; font-size:14px; line-height:1.6}
  .empty .ico{font-size:40px; display:block; margin-bottom:10px}

  .back{background:none; border:none; color:var(--accent); font-size:15px; font-weight:600;
    cursor:pointer; padding:0 0 12px; font-family:inherit}
  .newsitem{padding:11px 0; border-bottom:1px solid var(--line); display:block;
    color:inherit; text-decoration:none}
  .newsitem:last-child{border-bottom:none}
  .switch{position:relative; width:50px; height:30px; flex-shrink:0}
  .switch input{opacity:0; width:0; height:0; margin:0}
  .switch span{position:absolute; inset:0; background:var(--card2); border:1px solid var(--line);
    border-radius:99px; transition:.2s; cursor:pointer}
  .switch span::before{content:''; position:absolute; width:24px; height:24px; border-radius:50%;
    background:#fff; top:2px; left:2px; transition:.2s}
  .switch input:checked + span{background:var(--up); border-color:var(--up)}
  .switch input:checked + span::before{transform:translateX(20px)}
  .chartwrap{position:relative; height:220px}
  .chartwrap.short{height:170px}
  .toast{position:fixed; left:50%; transform:translateX(-50%); bottom:100px; z-index:60;
    background:var(--card2); border:1px solid var(--line); color:var(--text);
    padding:10px 18px; border-radius:99px; font-size:13px; font-weight:600;
    box-shadow:0 6px 24px rgba(0,0,0,.4)}

  .logowrap{position:relative; width:34px; height:34px; flex-shrink:0; display:inline-block}
  .logowrap img{width:34px; height:34px; border-radius:9px; object-fit:contain;
    background:#fff; display:block}
  .mono{display:none; width:34px; height:34px; border-radius:9px; color:#fff;
    align-items:center; justify-content:center; font-weight:800; font-size:16px}
  .rowlogo{display:flex; align-items:center; gap:11px; min-width:0}

  .prepost{font-size:11px; color:var(--muted); margin-top:3px}
  .prepost b{color:var(--text)}

  .bench-bar{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px}
  .bench-bar button{font-size:11px; padding:5px 10px; border-radius:99px; cursor:pointer;
    border:1px solid var(--line); background:var(--card2); color:var(--muted); font-family:inherit; font-weight:600}
  .bench-bar button.on{color:#fff}
  .bench-bar button.bsp.on{background:#f5b941; border-color:#f5b941; color:#1a1205}
  .bench-bar button.bnq.on{background:#c77dff; border-color:#c77dff}

  .lock{position:fixed; inset:0; z-index:100; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
    padding:env(safe-area-inset-top) 24px}
  .lock .icon{font-size:54px}
  .lock h2{margin:0; font-size:20px}
  .lock p{color:var(--muted); text-align:center; margin:0; max-width:300px; line-height:1.5}

  .gauge{height:7px; border-radius:99px; background:linear-gradient(90deg,#ff6b6b,#f5b941,#3ddc97); position:relative; margin:8px 0}
  .gauge .pin{position:absolute; top:-4px; width:3px; height:15px; background:#fff; border-radius:2px; transform:translateX(-50%)}
  .range52{display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-top:3px}
  .recbadge{display:inline-block; padding:3px 10px; border-radius:99px; font-weight:700; font-size:13px}
</style>
</head>
<body>

<header>
  <h1 id="headerTitle">Moje Portfolio</h1>
  <span id="refreshInfo"></span>
</header>

<main id="view"></main>

<nav class="tabbar" id="tabbar">
  <button data-tab="dash"><span class="ico">◔</span>Přehled</button>
  <button data-tab="portfolio"><span class="ico">▤</span>Portfolio</button>
  <button data-tab="watch"><span class="ico">★</span>Sledované</button>
  <button data-tab="news"><span class="ico">✉</span>Zprávy</button>
  <button data-tab="settings"><span class="ico">⚙</span>Nastavení</button>
</nav>

<div id="modalRoot"></div>

<script>
/* =========================================================
   STAV A PERSISTENCE (localStorage)
========================================================= */
const LS_KEY = 'mojeportfolio-v1';

function defaultState(){
  return {
    holdings: [],   // {id, symbol, name, type, currency, txs:[{id,kind,date,qty,price,fee}]}
    watchlist: [],  // {id, symbol, name, target}
    settings: { currency:'CZK', finnhubKey:'', alerts:false, dropPct:5 }
  };
}
function loadState(){
  try{
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    if (s && s.holdings && s.settings) return s;
  }catch(e){}
  return defaultState();
}
const state = loadState();
function save(){
  localStorage.setItem(LS_KEY, JSON.stringify({
    holdings: state.holdings, watchlist: state.watchlist, settings: state.settings
  }));
}

// Běhová data (neukládají se)
const quotes = {};      // symbol -> {price, prev, currency}
const fx = {};          // 'USDCZK' -> kurz
const divCache = {};    // symbol -> [{date(ms), amount}]
let lastRefresh = null;
let refreshing = false;
let currentTab = 'dash';
let detailId = null;    // id pozice v detailu
const alertedToday = {};
const charts = [];      // aktivní instance Chart.js

const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);

/* =========================================================
   FORMÁTOVÁNÍ
========================================================= */
const fmtMoney = (v, code, digits) => {
  try{
    return new Intl.NumberFormat('cs-CZ', {
      style:'currency', currency:code,
      maximumFractionDigits: digits ?? (Math.abs(v) >= 1 ? 2 : 4),
      minimumFractionDigits: 0
    }).format(v);
  }catch(e){ return v.toFixed(2) + ' ' + code; }
};
const fmtPct = v => (v >= 0 ? '+' : '') + v.toFixed(2) + '\u00a0%';
const fmtQty = v => new Intl.NumberFormat('cs-CZ', {maximumFractionDigits:8}).format(v);
const fmtDate = ms => new Date(ms).toLocaleDateString('cs-CZ', {day:'numeric', month:'short', year:'numeric'});
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const cls = v => v >= 0 ? 'up' : 'down';

/* =========================================================
   API – Yahoo (přes serverless proxy) a Finnhub (přímo)
========================================================= */
async function yahoo(params){
  const res = await fetch('/api/yahoo?' + new URLSearchParams(params));
  if (!res.ok) throw new Error('Yahoo ' + res.status);
  return res.json();
}

// Poslední zachycené pre/post ceny (drží se i přes víkend)
const LAST_PREPOST_KEY = 'mojeportfolio-prepost';
let lastPrepost = (() => {
  try{ return JSON.parse(localStorage.getItem(LAST_PREPOST_KEY)) || {}; }catch(e){ return {}; }
})();
function savePrepost(){
  try{ localStorage.setItem(LAST_PREPOST_KEY, JSON.stringify(lastPrepost)); }catch(e){}
}

// Cena z Finnhubu (volá se přímo z prohlížeče, mimo blokovaný Netlify server).
// Funguje pro US akcie a krypto; evropské burzy free tarif nepokrývá.
async function fetchQuoteFinnhub(symbol){
  const key = state.settings.finnhubKey;
  if (!key) throw new Error('no finnhub key');
  // Finnhub bere US tickery bez přípony (AAPL), krypto jako BINANCE:BTCUSDT – my řešíme jen akcie/ETF US
  const fsym = symbol.replace(/\.(US)$/i, '');
  const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(fsym)}&token=${encodeURIComponent(key)}`);
  if (!res.ok) throw new Error('finnhub ' + res.status);
  const d = await res.json();
  // c = current, pc = previous close; 0 znamená "nezná"
  if (!d || !d.c || d.c === 0) throw new Error('finnhub no data');
  return { symbol, price: d.c, prev: d.pc || d.c, currency: 'USD',
    pre: null, post: null, state: null };
}

async function fetchQuoteYahoo(symbol){
  const j = await yahoo({endpoint:'chart', symbol, range:'1d', interval:'5m', prepost:'1'});
  const m = j?.chart?.result?.[0]?.meta;
  if (!m || m.regularMarketPrice == null) throw new Error('no quote');
  const q = {
    symbol,
    price: m.regularMarketPrice,
    prev: m.chartPreviousClose ?? m.previousClose ?? m.regularMarketPrice,
    currency: m.currency || 'USD',
    pre:  m.preMarketPrice  ?? null,
    post: m.postMarketPrice ?? null,
    state: m.marketState || null
  };
  if (q.pre != null && q.state === 'PRE'){
    lastPrepost[symbol] = {kind:'pre', price:q.pre, ref:q.price, currency:q.currency, at:Date.now()};
    savePrepost();
  } else if (q.post != null && (q.state === 'POST' || q.state === 'POSTPOST' || q.state === 'CLOSED')){
    lastPrepost[symbol] = {kind:'post', price:q.post, ref:q.price, currency:q.currency, at:Date.now()};
    savePrepost();
  }
  return q;
}

// Hlavní: zkus nejdřív Finnhub (stabilní, mimo Netlify), pak Yahoo jako zálohu.
// US akcie většinou vyřeší Finnhub; evropská ETF spadnou na Yahoo.
async function fetchQuote(symbol){
  const isCrypto = symbol.includes('-USD');
  const looksUS = !symbol.includes('.') || /\.US$/i.test(symbol);
  // Finnhub zkoušej jen pro US akcie (na free tarifu krypto/EU nejde spolehlivě)
  if (state.settings.finnhubKey && looksUS && !isCrypto){
    try{ return await fetchQuoteFinnhub(symbol); }catch(e){ /* fallback na Yahoo */ }
  }
  return await fetchQuoteYahoo(symbol);
}

// Detailní fundamenty (P/E, 52t rozpětí, doporučení, earnings termín)
// DOČASNĚ VYPNUTO: endpoint quoteSummary spouštěl u Yahoo blokaci "Too Many Requests".
// Vrací null → detail pozice funguje bez P/E a doporučení (ceny, graf, dividendy jedou normálně).
const summaryCache = {};
const FUNDAMENTALS_ENABLED = false;
async function fetchSummary(symbol){
  if (!FUNDAMENTALS_ENABLED) return null;
  if (summaryCache[symbol]) return summaryCache[symbol];
  try{
    const j = await yahoo({endpoint:'quoteSummary', symbol});
    const r = j?.quoteSummary?.result?.[0];
    if (!r) return null;
    const sd = r.summaryDetail || {}, ks = r.defaultKeyStatistics || {},
          fd = r.financialData || {}, ce = r.calendarEvents || {},
          rt = r.recommendationTrend?.trend || [], eh = r.earningsHistory?.history || [];
    const out = {
      pe: sd.trailingPE?.raw ?? ks.trailingPE?.raw ?? null,
      forwardPE: sd.forwardPE?.raw ?? null,
      low52: sd.fiftyTwoWeekLow?.raw ?? null,
      high52: sd.fiftyTwoWeekHigh?.raw ?? null,
      divYield: sd.dividendYield?.raw ?? null,
      targetMean: fd.targetMeanPrice?.raw ?? null,
      recKey: fd.recommendationKey ?? null,        // buy / hold / sell…
      recMean: fd.recommendationMean?.raw ?? null, // 1=strong buy … 5=sell
      numAnalysts: fd.numberOfAnalystOpinions?.raw ?? null,
      nextEarnings: ce.earnings?.earningsDate?.[0]?.raw
        ? ce.earnings.earningsDate[0].raw * 1000 : null,
      recTrend: rt.slice(0,1).map(t => ({
        strongBuy:+t.strongBuy, buy:+t.buy, hold:+t.hold, sell:+t.sell, strongSell:+t.strongSell
      }))[0] || null,
      earningsHistory: eh.map(e => ({
        date: e.quarter?.raw ? e.quarter.raw*1000 : null,
        actual: e.epsActual?.raw ?? null,
        estimate: e.epsEstimate?.raw ?? null,
        surprisePct: e.surprisePercent?.raw != null ? e.surprisePercent.raw*100 : null
      })).filter(e => e.actual != null).slice(-4)
    };
    summaryCache[symbol] = out;
    return out;
  }catch(e){ return null; }
}

// Historická řada pro benchmark (S&P 500, Nasdaq…) – normalizovaná na % od začátku
const benchCache = {};
async function fetchBenchmark(symbol, rangeKey){
  const key = symbol + rangeKey;
  if (benchCache[key]) return benchCache[key];
  const h = await fetchHistory(symbol, rangeKey);
  benchCache[key] = h.points;
  return h.points;
}

const RANGES = [
  {key:'1d',  label:'1D',  interval:'5m'},
  {key:'1mo', label:'1M',  interval:'1d'},
  {key:'6mo', label:'6M',  interval:'1d'},
  {key:'1y',  label:'1R',  interval:'1d'},
  {key:'5y',  label:'5R',  interval:'1wk'},
];

async function fetchHistory(symbol, rangeKey){
  const r = RANGES.find(x => x.key === rangeKey) || RANGES[2];
  const j = await yahoo({endpoint:'chart', symbol, range:r.key, interval:r.interval, events:'div'});
  const res = j?.chart?.result?.[0];
  if (!res) throw new Error('no history');
  const points = [];
  const ts = res.timestamp || [];
  const closes = res.indicators?.quote?.[0]?.close || [];
  for (let i = 0; i < ts.length; i++){
    if (closes[i] != null) points.push({t: ts[i]*1000, c: closes[i]});
  }
  const dividends = Object.values(res.events?.dividends || {})
    .map(d => ({date: d.date*1000, amount: d.amount}))
    .sort((a,b) => a.date - b.date);
  return {points, dividends};
}

async function fetchSearch(q){
  const j = await yahoo({endpoint:'search', q});
  return (j?.quotes || [])
    .filter(x => x.symbol)
    .map(x => ({
      symbol: x.symbol,
      name: x.shortname || x.longname || x.symbol,
      exchange: x.exchDisp || x.exchange || '',
      quoteType: x.quoteType || ''
    }));
}

function fhDate(d){ return d.toISOString().slice(0,10); }

async function fetchNews(symbol, daysBack){
  const key = state.settings.finnhubKey;
  if (!key) return [];
  const to = new Date(), from = new Date(Date.now() - daysBack*86400e3);
  const res = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${encodeURIComponent(symbol)}&from=${fhDate(from)}&to=${fhDate(to)}&token=${encodeURIComponent(key)}`);
  if (!res.ok) return [];
  const j = await res.json();
  return (Array.isArray(j) ? j : []).slice(0,12).map(n => ({
    symbol, headline:n.headline, source:n.source, summary:n.summary,
    url:n.url, date:n.datetime*1000
  }));
}

async function fetchEarnings(symbol, daysAhead){
  const key = state.settings.finnhubKey;
  if (!key) return [];
  const from = new Date(), to = new Date(Date.now() + daysAhead*86400e3);
  const res = await fetch(`https://finnhub.io/api/v1/calendar/earnings?from=${fhDate(from)}&to=${fhDate(to)}&symbol=${encodeURIComponent(symbol)}&token=${encodeURIComponent(key)}`);
  if (!res.ok) return [];
  const j = await res.json();
  return (j?.earningsCalendar || []).map(e => ({
    symbol: e.symbol || symbol, date: e.date, eps: e.epsEstimate, hour: e.hour
  })).sort((a,b) => (a.date||'').localeCompare(b.date||''));
}

/* =========================================================
   VÝPOČTY PORTFOLIA
========================================================= */
const sortedTxs = h => [...h.txs].sort((a,b) => a.date - b.date);

function holdingQty(h){
  return h.txs.reduce((s,t) => s + (t.kind === 'buy' ? t.qty : -t.qty), 0);
}
function avgCost(h){
  let qty = 0, cost = 0;
  for (const t of sortedTxs(h)){
    if (t.kind === 'buy'){ cost += t.qty*t.price + (t.fee||0); qty += t.qty; }
    else { const a = qty > 0 ? cost/qty : 0; cost -= a*t.qty; qty -= t.qty; }
  }
  return qty > 0 ? cost/qty : 0;
}
function realizedPL(h){
  let qty = 0, cost = 0, real = 0;
  for (const t of sortedTxs(h)){
    if (t.kind === 'buy'){ cost += t.qty*t.price + (t.fee||0); qty += t.qty; }
    else {
      const a = qty > 0 ? cost/qty : 0;
      real += (t.price - a)*t.qty - (t.fee||0);
      cost -= a*t.qty; qty -= t.qty;
    }
  }
  return real;
}
function toDisplay(amount, fromCur){
  const target = state.settings.currency;
  if (fromCur === target) return amount;
  const r = fx[fromCur + target];
  return r ? amount * r : amount;
}
const hCurrency  = h => quotes[h.symbol]?.currency || h.currency;
const hPrice     = h => quotes[h.symbol]?.price ?? avgCost(h);
const hValue     = h => toDisplay(hPrice(h) * holdingQty(h), hCurrency(h));
const hCost      = h => toDisplay(avgCost(h) * holdingQty(h), h.currency);
const hDayChange = h => {
  const q = quotes[h.symbol]; if (!q) return 0;
  return toDisplay((q.price - q.prev) * holdingQty(h), q.currency);
};
const qChangePct = q => q.prev ? (q.price - q.prev)/q.prev*100 : 0;

const activeHoldings = () => state.holdings.filter(h => holdingQty(h) > 1e-9);

function totals(){
  const hs = activeHoldings();
  const value = hs.reduce((s,h) => s + hValue(h), 0);
  const cost  = hs.reduce((s,h) => s + hCost(h), 0);
  const day   = hs.reduce((s,h) => s + hDayChange(h), 0);
  const realized = state.holdings.reduce((s,h) => s + toDisplay(realizedPL(h), h.currency), 0);
  return {
    value, cost, day, realized,
    pl: value - cost,
    plPct: cost ? (value-cost)/cost*100 : 0,
    dayPct: (value - day) ? day/(value-day)*100 : 0
  };
}

function trailingDividends(){
  let sum = 0;
  for (const h of activeHoldings()){
    const divs = divCache[h.symbol] || [];
    const total = divs.reduce((s,d) => s + d.amount, 0) * holdingQty(h);
    sum += toDisplay(total, h.currency);
  }
  return sum;
}

function logoBase(h){ return (h.symbol || '').split('.')[0].split('-')[0].toUpperCase(); }

// Vrátí seřazený seznam URL ke zkoušení (postupně přes onerror)
function logoCandidates(h){
  const base = logoBase(h);
  const domain = LOGO_DOMAINS[base];
  const list = [];
  if (domain){
    // Pořadí podle spolehlivosti: DuckDuckGo a Google jsou roky stabilní a bez klíče.
    list.push(`https://icons.duckduckgo.com/ip3/${domain}.ico`);
    list.push(`https://www.google.com/s2/favicons?domain=${domain}&sz=64`);
  }
  return list;
}

function monogram(h){
  const c = (h.symbol || '?')[0].toUpperCase();
  const colors = ['#5b8cff','#3ddc97','#f5b941','#c77dff','#ff8fab','#4cc9f0'];
  const idx = (h.symbol || '').split('').reduce((s,ch) => s + ch.charCodeAt(0), 0) % colors.length;
  return `<span class="mono" style="background:${colors[idx]}">${c}</span>`;
}

function logoHTML(h){
  const cands = logoCandidates(h);
  const mono = monogram(h);
  if (!cands.length) return `<span class="logowrap">${mono.replace('display:none', 'display:flex')}</span>`;
  // data-fallbacks: zbývající URL, které onerror postupně zkusí, než spadne na monogram
  const rest = cands.slice(1).join('|');
  return `<span class="logowrap">
    <img src="${cands[0]}" alt="" loading="lazy" data-fallbacks="${esc(rest)}"
      onerror="logoFallback(this)">
    ${mono}</span>`;
}

// Postupné zkoušení dalších zdrojů loga; po vyčerpání zobrazí monogram
function logoFallback(img){
  const list = (img.dataset.fallbacks || '').split('|').filter(Boolean);
  if (list.length){
    img.dataset.fallbacks = list.slice(1).join('|');
    img.src = list[0];
  } else {
    img.style.display = 'none';
    if (img.nextElementSibling) img.nextElementSibling.style.display = 'flex';
  }
}

/* Rekonstrukce historické hodnoty portfolia z transakcí + historických cen.
   Broker minulé denní hodnoty nedává – sestavujeme „kolik by tehdejší pozice stály".
   Vrací řadu v zobrazovací měně (FX bereme aktuální, kvůli jednoduchosti). */
async function buildPortfolioHistory(rangeKey){
  const hs = activeHoldings();
  if (!hs.length) return {portfolio:[], invested:[]};

  const histories = {};
  await Promise.allSettled(hs.map(async h => {
    try{ histories[h.symbol] = (await fetchHistory(h.symbol, rangeKey)).points; }
    catch(e){ histories[h.symbol] = []; }
  }));

  // Sjednocená osa dat
  const dateSet = new Set();
  Object.values(histories).forEach(pts => pts.forEach(p => dateSet.add(p.t)));
  const dates = [...dateSet].sort((a,b) => a - b);
  if (!dates.length) return {portfolio:[], invested:[]};

  // Rychlé vyhledání ceny k datu (poslední známá ≤ t)
  const priceAt = (pts, t) => {
    let lo = 0, hi = pts.length - 1, ans = null;
    while (lo <= hi){ const mid = (lo+hi)>>1;
      if (pts[mid].t <= t){ ans = pts[mid].c; lo = mid+1; } else hi = mid-1; }
    return ans;
  };

  const portfolio = [], invested = [];
  for (const t of dates){
    let val = 0, inv = 0;
    for (const h of hs){
      // Množství a investice držené k tomuto datu
      let qty = 0, cost = 0;
      for (const tx of sortedTxs(h)){
        if (tx.date > t) break;
        if (tx.kind === 'buy'){ qty += tx.qty; cost += tx.qty*tx.price + (tx.fee||0); }
        else { const a = qty>0?cost/qty:0; cost -= a*tx.qty; qty -= tx.qty; }
      }
      if (qty <= 1e-9) continue;
      const px = priceAt(histories[h.symbol] || [], t);
      if (px == null) continue;
      val += toDisplay(px * qty, hCurrency(h));
      inv += toDisplay(cost, h.currency);
    }
    if (val > 0){ portfolio.push({t, c: val}); invested.push({t, c: inv}); }
  }
  return {portfolio, invested};
}

// Pomocná: stáhne kotace po malých dávkách s odstupem, aby Yahoo neblokoval
async function fetchQuotesBatched(symbols, batchSize, gapMs){
  for (let i = 0; i < symbols.length; i += batchSize){
    const batch = symbols.slice(i, i + batchSize);
    await Promise.allSettled(batch.map(async s => {
      try{ quotes[s] = await fetchQuote(s); }catch(e){ /* ponech starou cenu */ }
    }));
    if (i + batchSize < symbols.length) await new Promise(r => setTimeout(r, gapMs));
  }
}

async function refreshAll(){
  if (refreshing) return;
  refreshing = true;
  setRefreshInfo();

  const symbols = [...new Set([
    ...state.holdings.map(h => h.symbol),
    ...state.watchlist.map(w => w.symbol)
  ])];

  // Směnné kurzy potřebné pro přepočet (přidáme k symbolům)
  const target = state.settings.currency;
  const knownCurs = new Set(state.holdings.map(h => h.currency));
  Object.values(quotes).forEach(q => q && knownCurs.add(q.currency));
  const fxSymbols = [...knownCurs].filter(c => c !== target).map(c => `${c}${target}=X`);

  // Vše stáhneme po dávkách 3 symbolů s odstupem 600 ms – šetrné k Yahoo
  await fetchQuotesBatched([...symbols, ...fxSymbols], 3, 600);

  // Zapiš získané FX kurzy
  for (const c of knownCurs){
    if (c === target) continue;
    const q = quotes[`${c}${target}=X`];
    if (q) fx[c + target] = q.price;
  }

  lastRefresh = new Date();
  refreshing = false;
  setRefreshInfo();
  checkAlerts();
  if (currentTab === 'dash' || currentTab === 'portfolio' || currentTab === 'watch') render();
}

async function refreshDividends(){
  await Promise.allSettled(activeHoldings()
    .filter(h => h.type !== 'Krypto')
    .map(async h => { divCache[h.symbol] = (await fetchHistory(h.symbol, '1y')).dividends; }));
}

function setRefreshInfo(){
  const el = document.getElementById('refreshInfo');
  el.classList.toggle('spin', refreshing);
  el.textContent = refreshing ? 'aktualizuji…'
    : lastRefresh ? lastRefresh.toLocaleTimeString('cs-CZ') : '';
}

function notify(key, title, body){
  const today = new Date().toDateString();
  if (alertedToday[key] === today) return;
  alertedToday[key] = today;
  if ('Notification' in window && Notification.permission === 'granted'){
    try{ new Notification(title, {body}); }catch(e){}
  }
  toast(title);
}

function checkAlerts(){
  if (!state.settings.alerts) return;
  for (const h of activeHoldings()){
    const q = quotes[h.symbol]; if (!q) continue;
    const pct = qChangePct(q);
    if (pct <= -state.settings.dropPct)
      notify('drop-'+h.symbol, `📉 ${h.symbol} dnes ${fmtPct(pct)}`,
        `${h.name}: ${fmtMoney(q.price, q.currency)}`);
  }
  for (const w of state.watchlist){
    const q = quotes[w.symbol];
    if (w.target && q && q.price <= w.target)
      notify('target-'+w.symbol, `🎯 ${w.symbol} pod cílovou cenou`,
        `${fmtMoney(q.price, q.currency)} ≤ cíl ${fmtMoney(w.target, q.currency)}`);
  }
}

function toast(msg){
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

function toggleBench(k){ dashBench[k] = !dashBench[k]; renderDash(); }

async function drawPortfolioChart(){
  const canvas = document.getElementById('portChart');
  if (!canvas) return;
  const {portfolio, invested} = await buildPortfolioHistory(dashRange);
  const loading = document.getElementById('portLoading');
  if (loading) loading.style.display = 'none';
  if (!portfolio.length || !document.getElementById('portChart')) return;

  const code = state.settings.currency;
  const showBench = dashBench.sp || dashBench.nq;
  const base = portfolio[0].c;
  const labels = portfolio.map(p => new Date(p.t).toLocaleDateString('cs-CZ', {day:'numeric',month:'numeric',year:'2-digit'}));

  const datasets = [];
  if (showBench){
    // Režim srovnání: vše v % od začátku
    datasets.push({ label:'Portfolio', data: portfolio.map(p => (p.c/base-1)*100),
      borderColor:'#3ddc97', borderWidth:2, pointRadius:0, tension:.25, yAxisID:'y' });
    const addBench = async (sym, color, label) => {
      const pts = await fetchBenchmark(sym, dashRange);
      if (!pts.length) return;
      const b0 = pts[0].c;
      const map = {}; pts.forEach(p => { map[new Date(p.t).toDateString()] = p.c; });
      const series = portfolio.map(p => {
        const v = map[new Date(p.t).toDateString()];
        return v != null ? (v/b0-1)*100 : null;
      });
      datasets.push({ label, data: series, borderColor: color, borderWidth:1.5,
        pointRadius:0, tension:.25, borderDash:[5,3], yAxisID:'y', spanGaps:true });
    };
    if (dashBench.sp) await addBench('^GSPC', '#f5b941', 'S&P 500');
    if (dashBench.nq) await addBench('^NDX', '#c77dff', 'Nasdaq 100');
  } else {
    const isUp = portfolio[portfolio.length-1].c >= base;
    const color = isUp ? '#3ddc97' : '#ff6b6b';
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0,0,0,220);
    grad.addColorStop(0, color+'40'); grad.addColorStop(1, color+'00');
    datasets.push({ label:'Hodnota', data: portfolio.map(p=>p.c), borderColor:color,
      backgroundColor:grad, fill:true, pointRadius:0, borderWidth:2, tension:.25, yAxisID:'y' });
    datasets.push({ label:'Vloženo', data: invested.map(p=>p.c), borderColor:'#5b6884',
      borderWidth:1.5, pointRadius:0, borderDash:[4,4], tension:.1, yAxisID:'y' });
  }

  destroyChartById('portChart');
  charts.push(new Chart(canvas, {
    type:'line', data:{labels, datasets},
    options:{ maintainAspectRatio:false, interaction:{intersect:false, mode:'index'},
      plugins:{ legend:{display:showBench || true, labels:{color:CHART_TICK, boxWidth:12, font:{size:10}}},
        tooltip:{callbacks:{label: c => showBench
          ? c.dataset.label+': '+(c.parsed.y>=0?'+':'')+c.parsed.y.toFixed(1)+' %'
          : c.dataset.label+': '+fmtMoney(c.parsed.y, code, 0)}}},
      scales:{ x:{grid:{display:false}, ticks:{color:CHART_TICK, maxTicksLimit:5, maxRotation:0}},
        y:{grid:{color:CHART_GRID}, ticks:{color:CHART_TICK, maxTicksLimit:5,
          callback: v => showBench ? v.toFixed(0)+'%' : v}}}
    }
  }));
}

async function drawPriceChart(h){
  const canvas = document.getElementById('priceChart');
  if (!canvas) return;
  try{
    if (!detailCache.points) detailCache = await fetchHistory(h.symbol, detailRange);
  }catch(e){ return; }
  const pts = detailCache.points || [];
  if (!pts.length || !document.getElementById('priceChart')) return;

  const isUp = pts[pts.length-1].c >= pts[0].c;
  const color = isUp ? '#3ddc97' : '#ff6b6b';
  const labels = pts.map(p => {
    const d = new Date(p.t);
    return detailRange === '1d'
      ? d.toLocaleTimeString('cs-CZ', {hour:'2-digit', minute:'2-digit'})
      : d.toLocaleDateString('cs-CZ', {day:'numeric', month:'numeric', year:'2-digit'});
  });

  // Body earnings z historie (zobrazí se jako oranžové tečky na křivce)
  const eps = (summaryCache[h.symbol]?.earningsHistory || []);
  const pointStyle = pts.map(() => 0);
  const pointColors = pts.map(() => color);
  eps.forEach(e => {
    if (!e.date) return;
    // najdi nejbližší bod grafu
    let bi = -1, best = Infinity;
    pts.forEach((p,i) => { const d = Math.abs(p.t - e.date); if (d < best){ best = d; bi = i; } });
    if (bi >= 0 && best < 6*86400e3){
      pointStyle[bi] = 5;
      pointColors[bi] = (e.surprisePct ?? 0) >= 0 ? '#3ddc97' : '#ff6b6b';
    }
  });

  destroyChartById('priceChart');
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,0,220);
  grad.addColorStop(0, color + '40'); grad.addColorStop(1, color + '00');

  charts.push(new Chart(canvas, {
    type:'line',
    data:{ labels, datasets:[{ data: pts.map(p=>p.c), borderColor:color, backgroundColor:grad,
      fill:true, pointRadius:pointStyle, pointBackgroundColor:pointColors, pointBorderColor:pointColors,
      borderWidth:2, tension:.25 }]},
    options:{
      maintainAspectRatio:false, interaction:{intersect:false, mode:'index'},
      plugins:{ legend:{display:false},
        tooltip:{ callbacks:{ label: c => fmtMoney(c.parsed.y, h.currency) }}},
      scales:{
        x:{ grid:{display:false}, ticks:{color:CHART_TICK, maxTicksLimit:5, maxRotation:0}},
        y:{ grid:{color:CHART_GRID}, ticks:{color:CHART_TICK, maxTicksLimit:5}}
      }
    }
  }));

  const em = document.getElementById('earnMarkers');
  if (em && eps.length) em.innerHTML = '🟢/🔴 tečky v grafu = kvartální výsledky (zelená = překonání odhadu EPS, červená = zaostání)';
}

  strong_buy:'Silný nákup', buy:'Nákup', hold:'Držet', sell:'Prodej', strong_sell:'Silný prodej',
  underperform:'Pod trhem', outperform:'Nad trhem'
};
const REC_COLORS = {

async function loadFundamentals(h){
  if (h.symbol.includes('-')) return;  // krypto fundamenty nemá
  const s = await fetchSummary(h.symbol);
  if (!s || detailId !== h.id) return;
  const q = quotes[h.symbol];

  // Fundamenty: P/E, 52t rozpětí
  const fund = document.getElementById('fundBox');
  if (fund){
    let rangeHTML = '';
    if (s.low52 != null && s.high52 != null && q){
      const pct = Math.max(0, Math.min(100, (q.price - s.low52)/(s.high52 - s.low52)*100));
      rangeHTML = `
        <div style="margin-top:10px">
          <div class="label">52týdenní rozpětí</div>
          <div class="gauge"><div class="pin" style="left:${pct}%"></div></div>
          <div class="range52"><span class="num">${fmtMoney(s.low52, h.currency)}</span>
            <span class="num">${fmtMoney(s.high52, h.currency)}</span></div>
        </div>`;
    }
    fund.innerHTML = `<div class="card">
      <h3>Ukazatele</h3>
      <div class="grid2">
        ${s.pe != null ? `<div class="stat"><div class="label">P/E (trailing)</div><div class="v num">${s.pe.toFixed(1)}</div></div>` : ''}
        ${s.forwardPE != null ? `<div class="stat"><div class="label">P/E (forward)</div><div class="v num">${s.forwardPE.toFixed(1)}</div></div>` : ''}
        ${s.divYield != null ? `<div class="stat"><div class="label">Div. výnos</div><div class="v num">${(s.divYield*100).toFixed(2)} %</div></div>` : ''}
        ${s.targetMean != null ? `<div class="stat"><div class="label">Cílová cena (analytici)</div><div class="v num">${fmtMoney(s.targetMean, h.currency)}</div></div>` : ''}
      </div>
      ${rangeHTML}
    </div>`;
  }

  // Doporučení analytiků
  const rec = document.getElementById('recBox');
  if (rec && (s.recKey || s.recTrend)){
    const key = (s.recKey || '').toLowerCase();
    const label = REC_LABELS[key] || s.recKey || '–';
    const color = REC_COLORS[key] || '#5b8cff';
    let bars = '';
    if (s.recTrend){
      const tr = s.recTrend, tot = tr.strongBuy+tr.buy+tr.hold+tr.sell+tr.strongSell || 1;
      const seg = [['Silný nákup',tr.strongBuy,'#1e9e6a'],['Nákup',tr.buy,'#3ddc97'],
        ['Držet',tr.hold,'#f5b941'],['Prodej',tr.sell,'#ff8787'],['Silný prodej',tr.strongSell,'#ff6b6b']];
      bars = `<div style="display:flex; height:10px; border-radius:5px; overflow:hidden; margin:10px 0 6px">
        ${seg.map(([,n,c]) => n>0 ? `<div style="width:${n/tot*100}%; background:${c}"></div>` : '').join('')}</div>
        <div class="tiny muted">${seg.filter(([,n])=>n>0).map(([l,n])=>`${l}: ${n}`).join(' · ')}</div>`;
    }
    rec.innerHTML = `<div class="card">
      <h3>Doporučení analytiků</h3>
      <div style="display:flex; align-items:center; gap:10px">
        <span class="recbadge" style="background:${color}22; color:${color}">${label}</span>
        ${s.numAnalysts ? `<span class="tiny muted">${s.numAnalysts} analytiků</span>` : ''}
        ${s.targetMean != null && q ? `<span class="tiny ${cls(s.targetMean-q.price)}" style="margin-left:auto">
          potenciál ${fmtPct((s.targetMean/q.price-1)*100)}</span>` : ''}
      </div>
      ${bars}
    </div>`;
  }

  // Měnový dopad (jen když se měna aktiva liší od zobrazovací)
  const code = state.settings.currency;
  const fxBox = document.getElementById('fxBox');
  if (fxBox && h.currency !== code){
    const rate = fx[h.currency + code];
    if (rate){
      fxBox.innerHTML = `
        <div class="label">Měnový dopad (${h.currency} → ${code})</div>
        <div class="small num">Aktuální kurz: <b>1 ${h.currency} = ${rate.toFixed(3)} ${code}</b></div>
        <div class="tiny muted" style="margin-top:3px">Tvoje pozice je v ${h.currency}. Hodnota v ${code} kolísá nejen s cenou akcie, ale i s kurzem – posílení ${code} ti hodnotu v přepočtu snižuje a naopak.</div>`;
    }
  }
}

          <span style="font-size:22px">🗓</span>

          </div></div>`;
      }
    }catch(e){}
  }

  // Zprávy (Finnhub)
  if (!state.settings.finnhubKey || h.symbol.includes('-')) return;
  try{
    const news = await fetchNews(h.symbol, 14);

      nBox.innerHTML = `<div class="card"><h3>Zprávy</h3>

            <div class="tiny muted">${esc(n.source)} · ${fmtDate(n.date)}</div>

function daysUntil(ms){
  const d = Math.ceil((ms - Date.now())/86400e3);
  if (d < 0) return 'proběhlo';
  if (d === 0) return 'dnes';
  if (d === 1) return 'zítra';
  return 'za ' + d + ' dní';
}

function deleteTx(hid, tid){
  if (!confirm('Smazat tuto transakci?')) return;
  const h = state.holdings.find(x => x.id === hid); if (!h) return;
  h.txs = h.txs.filter(t => t.id !== tid);
  save(); renderDetail();
}
function deleteHolding(hid){
  const h = state.holdings.find(x => x.id === hid); if (!h) return;
  if (!confirm(`Opravdu odstranit ${h.symbol} včetně všech transakcí?`)) return;
  state.holdings = state.holdings.filter(x => x.id !== hid);
  save(); closeDetail();
}

async function renderDividendsPage(){
  document.getElementById('headerTitle').textContent = 'Dividendy';
  const code = state.settings.currency;
  view.innerHTML = `<button class="back" onclick="closeDetail()">‹ Zpět</button>
    <div class="empty">Načítám historii dividend…</div>`;

  await refreshDividends();
  if (detailId !== 'DIVIDENDS') return;

  const bySymbol = activeHoldings().map(h => {
    const divs = divCache[h.symbol] || [];
    return { symbol: h.symbol,
      income: toDisplay(divs.reduce((s,d) => s + d.amount, 0) * holdingQty(h), h.currency) };
  }).filter(x => x.income > 0).sort((a,b) => b.income - a.income);

  const monthly = {};
  const monthlyBySymbol = {};
  for (const h of activeHoldings()){
    for (const d of (divCache[h.symbol] || [])){
      const dt = new Date(d.date);
      const k = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
      const amt = toDisplay(d.amount * holdingQty(h), h.currency);
      monthly[k] = (monthly[k] || 0) + amt;
      (monthlyBySymbol[k] = monthlyBySymbol[k] || {})[h.symbol] =
        (monthlyBySymbol[k]?.[h.symbol] || 0) + amt;
    }
  }
  const months = Object.keys(monthly).sort();
  const total = trailingDividends();

  // Barvy podle titulu (stejné pořadí jako koláč na přehledu)
  const palette = ['#5b8cff','#3ddc97','#f5b941','#c77dff','#ff8fab','#4cc9f0','#ffa94d','#69db7c','#da77f2','#ff8787'];
  const symColor = {};
  bySymbol.forEach((x,i) => { symColor[x.symbol] = palette[i % palette.length]; });

  // Předpověď příští dividendy: poslední výplata + typický interval (rok/4)
  const upcoming = [];
  for (const h of activeHoldings()){
    const divs = (divCache[h.symbol] || []).slice().sort((a,b)=>a.date-b.date);
    if (divs.length < 2) continue;
    const last = divs[divs.length-1];
    // odhad intervalu z mediánu rozestupů
    const gaps = [];
    for (let i=1;i<divs.length;i++) gaps.push(divs[i].date - divs[i-1].date);
    gaps.sort((a,b)=>a-b);
    const interval = gaps[Math.floor(gaps.length/2)];
    const next = last.date + interval;
    if (next > Date.now() - 7*86400e3){
      upcoming.push({ symbol:h.symbol, date:next, amount:last.amount*holdingQty(h),
        cur:h.currency, estimate:true });
    }
  }
  upcoming.sort((a,b)=>a.date-b.date);

  view.innerHTML = `
    <button class="back" onclick="closeDetail()">‹ Zpět</button>
    <div class="card">
      <div class="label">Příjem za posledních 12 měsíců</div>
      <div class="big num up">${fmtMoney(total, code, 0)}</div>
      <div class="small muted num">≈ ${fmtMoney(total/12, code, 0)} měsíčně</div>
    </div>

    ${upcoming.length ? `<div class="card"><h3>Dividendový kalendář (odhad)</h3>
      ${upcoming.slice(0,8).map(u => `
        <div class="row" style="cursor:default">
          <div class="rowlogo">
            <span style="width:9px;height:9px;border-radius:2px;background:${symColor[u.symbol]||'#5b8cff'};flex-shrink:0"></span>
            <div class="l"><div class="sym">${esc(u.symbol)}</div>
              <div class="name">${fmtDate(u.date)} · ${daysUntil(u.date)}</div></div>
          </div>
          <span class="num up">~ ${fmtMoney(toDisplay(u.amount, u.cur), code, 0)}</span>
        </div>`).join('')}
      <div class="tiny muted" style="margin-top:6px">Odhad podle historie výplat a obvyklého intervalu – skutečný termín a částku potvrzuje až firma.</div>
    </div>` : ''}

    ${months.length ? `<div class="card"><h3>Po měsících</h3>
      <div class="chartwrap short"><canvas id="divChart"></canvas></div>

async function fixTypesAndNames(){
  let changed = 0;
  for (const h of state.holdings){
    const root = etfRoot(h.symbol);
    // ETF podle tabulky
    if (KNOWN_ETF[root]){
      if (h.type !== 'ETF'){ h.type = 'ETF'; changed++; }
      if (h.name !== KNOWN_ETF[root]){ h.name = KNOWN_ETF[root]; changed++; }
      continue;
    }
    // krypto podle symbolu
    if (h.symbol.includes('-USD') || /^(BTC|ETH|SOL|ADA|XRP|DOGE|DOT|LTC|BNB|AVAX|MATIC)$/.test(root)){
      if (h.type !== 'Krypto'){ h.type = 'Krypto'; changed++; }
      continue;
    }
    // ostatní: zkus doplnit hezký název z Yahoo, když je name jen ticker
    if ((!h.name || h.name.toUpperCase() === h.symbol.toUpperCase())){
      try{
        const sr = await fetchSearch(h.symbol);
        const hit = sr.find(x => x.symbol === h.symbol) || sr[0];
        if (hit){
          if (hit.name){ h.name = hit.name; changed++; }
          if (hit.quoteType === 'ETF' && h.type !== 'ETF'){ h.type = 'ETF'; changed++; }
          else if (hit.quoteType === 'CRYPTOCURRENCY' && h.type !== 'Krypto'){ h.type = 'Krypto'; changed++; }
        }
      }catch(e){}
    }
  }
  save(); render();
  toast(changed ? `Opraveno ${changed} údajů ✓` : 'Vše už je v pořádku');
}

function exportData(){
  const blob = new Blob([JSON.stringify({holdings:state.holdings, watchlist:state.watchlist, settings:state.settings}, null, 2)],
    {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'moje-portfolio-zaloha.json';
  a.click();
}
function importData(input){
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const d = JSON.parse(reader.result);
      if (!d.holdings || !d.settings) throw 0;
      state.holdings = d.holdings; state.watchlist = d.watchlist || []; state.settings = d.settings;
      save(); toast('Záloha načtena ✓'); refreshAll(); render();
    }catch(e){ toast('Soubor se nepodařilo načíst'); }
  };
  reader.readAsText(file);
}

const modalRoot = document.getElementById('modalRoot');
function openModal(html){

    <div class="modal"><button class="close" onclick="closeModal()">✕</button>${html}</div></div>`;

function closeModal(){ modalRoot.innerHTML = ''; }

let searchMode = 'holding'; // 'holding' | 'watch'
function openSearch(mode){
  searchMode = mode;
  openModal(`
    <h2>${mode === 'watch' ? 'Sledovat titul' : 'Přidat pozici'}</h2>
    <input id="searchQ" type="text" placeholder="Hledej: Apple, VWCE, bitcoin…"
      autocomplete="off" autocapitalize="off">
    <button class="btn primary" onclick="doSearch()">Hledat</button>
    <div class="tiny muted" style="margin-top:10px">Evropská ETF s příponou burzy (VWCE.DE, CSPX.AS), pražská burza .PR (CEZ.PR), krypto jako BTC-USD.</div>
    <div id="searchResults" style="margin-top:12px"></div>
  `);
  const inp = document.getElementById('searchQ');
  inp.focus();
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
}

async function doSearch(){
  const q = document.getElementById('searchQ').value.trim();
  if (!q) return;
  const box = document.getElementById('searchResults');
  box.innerHTML = '<div class="muted small">Hledám…</div>';
  try{
    const results = await fetchSearch(q);
    window._searchResults = results;
    box.innerHTML = results.length ? results.map((r,i) => `
      <div class="row" onclick="pickResult(${i})">
        <div class="l"><div class="sym">${esc(r.symbol)}</div>
          <div class="name">${esc(r.name)}</div></div>
        <div class="r tiny muted">${esc(r.exchange)}</div>
      </div>`).join('') : '<div class="muted small">Nic nenalezeno.</div>';
  }catch(e){ box.innerHTML = '<div class="muted small">Vyhledávání selhalo, zkus to znovu.</div>'; }
}

async function pickResult(i){
  const r = window._searchResults[i]; if (!r) return;
  if (searchMode === 'watch'){
    if (!state.watchlist.some(w => w.symbol === r.symbol)){
      state.watchlist.push({id:uid(), symbol:r.symbol, name:r.name, target:null});
      save();
    }
    closeModal(); refreshAll(); render();
    return;
  }
  // Nová pozice – načti měnu a cenu, pak formulář prvního nákupu
  openModal(`<h2>${esc(r.symbol)}</h2><div class="muted small">Načítám aktuální cenu…</div>`);
  let cur = 'USD', price = '';
  try{
    const q = await fetchQuote(r.symbol);
    cur = q.currency; price = q.price.toFixed(4);
    quotes[r.symbol] = q;
  }catch(e){}
  const type = r.quoteType === 'ETF' ? 'ETF' : r.quoteType === 'CRYPTOCURRENCY' ? 'Krypto' : 'Akcie';
  openModal(`
    <h2>${esc(r.symbol)}</h2>
    <div class="muted small" style="margin-bottom:14px">${esc(r.name)} · ${cur}</div>
    <label class="f">Typ aktiva</label>
    <select id="hType">
      ${['Akcie','ETF','Krypto'].map(t => `<option ${t===type?'selected':''}>${t}</option>`).join('')}
    </select>
    <label class="f">Datum nákupu</label>
    <input id="hDate" type="date" value="${new Date().toISOString().slice(0,10)}">
    <label class="f">Množství (ks)</label>
    <input id="hQty" type="text" inputmode="decimal" placeholder="např. 10">
    <label class="f">Cena za kus (${cur})</label>
    <input id="hPrice" type="text" inputmode="decimal" value="${price}">
    <label class="f">Poplatek (${cur}, volitelné)</label>
    <input id="hFee" type="text" inputmode="decimal" placeholder="0">
    <button class="btn primary" onclick="saveNewHolding('${esc(r.symbol)}', '${esc(r.name).replace(/'/g, '&#39;')}', '${cur}')">Uložit nákup</button>
  `);
}

function pnum(id){
  const v = parseFloat((document.getElementById(id)?.value || '').replace(',', '.'));
  return isFinite(v) ? v : null;
}

function saveNewHolding(symbol, name, currency){
  const qty = pnum('hQty'), price = pnum('hPrice');
  if (!qty || qty <= 0 || price == null || price < 0){ toast('Vyplň množství a cenu'); return; }
  const tx = { id:uid(), kind:'buy',
    date: new Date(document.getElementById('hDate').value || Date.now()).getTime(),
    qty, price, fee: pnum('hFee') || 0 };
  const existing = state.holdings.find(h => h.symbol === symbol);
  if (existing) existing.txs.push(tx);
  else state.holdings.push({ id:uid(), symbol, name, currency,
    type: document.getElementById('hType').value, txs:[tx] });
  save(); closeModal(); refreshAll(); render(); toast('Pozice uložena ✓');
}

function openTxModal(hid){
  const h = state.holdings.find(x => x.id === hid); if (!h) return;
  const q = quotes[h.symbol];
  openModal(`
    <h2>${esc(h.symbol)}</h2>
    <div class="seg" id="txKind">
      <button class="active" data-k="buy">Nákup</button>
      <button data-k="sell">Prodej</button>
    </div>
    <label class="f">Datum</label>
    <input id="tDate" type="date" value="${new Date().toISOString().slice(0,10)}">
    <label class="f">Množství (ks) – aktuálně držíš ${fmtQty(holdingQty(h))}</label>
    <input id="tQty" type="text" inputmode="decimal">
    <label class="f">Cena za kus (${h.currency})</label>
    <input id="tPrice" type="text" inputmode="decimal" value="${q ? q.price.toFixed(4) : ''}">
    <label class="f">Poplatek (volitelné)</label>
    <input id="tFee" type="text" inputmode="decimal" placeholder="0">
    <button class="btn primary" onclick="saveTx('${hid}')">Uložit</button>
  `);
  document.getElementById('txKind').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    document.querySelectorAll('#txKind button').forEach(x => x.classList.toggle('active', x === b));
  });
}

function saveTx(hid){
  const h = state.holdings.find(x => x.id === hid); if (!h) return;
  const qty = pnum('tQty'), price = pnum('tPrice');
  if (!qty || qty <= 0 || price == null){ toast('Vyplň množství a cenu'); return; }
  const kind = document.querySelector('#txKind button.active').dataset.k;
  if (kind === 'sell' && qty > holdingQty(h) + 1e-9){ toast('Nemůžeš prodat víc, než držíš'); return; }
  h.txs.push({ id:uid(), kind,
    date: new Date(document.getElementById('tDate').value || Date.now()).getTime(),
    qty, price, fee: pnum('tFee') || 0 });
  save(); closeModal(); render(); toast('Transakce uložena ✓');
}

  cprice: ['cena zavření','cena zavreni','close price'],
  cdate:  ['čas zavření','cas zavreni','close time'],
  price:  ['cena otevření','cena otevreni','open price','price per share','cena za kus','cena','price'],
};
const ROLE_LABELS = {
  symbol:'Symbol *', type:'Typ (nákup/prodej)', qty:'Množství *', date:'Datum *',
  price:'Cena za kus *', fee:'Poplatek', cur:'Měna', cprice:'Cena zavření (XTB)', cdate:'Čas zavření (XTB)'
};

function openImport(){
  imp = null;
  openModal(`
    <h2>Import z brokera</h2>
    <div class="small muted" style="margin-bottom:12px">
      Nahraj výpis transakcí ve formátu <b>CSV nebo Excel</b> (XTB, Revolut i jiní brokeři).
      Soubor se zpracuje pouze v tomto zařízení – nikam se neodesílá.
      Před importem uvidíš náhled a sám vybereš, co zahrnout.</div>
    <input type="file" id="impFile" accept=".csv,.xlsx,.xls,.txt" onchange="impLoadFile(this)">
    <div id="impBody"></div>
  `);

function impLoadFile(input){
  const file = input.files[0]; if (!file) return;
  const body = document.getElementById('impBody');
  body.innerHTML = '<div class="muted small">Načítám soubor…</div>';
  const isXlsx = /\.xlsx?$/i.test(file.name);
  const reader = new FileReader();
  reader.onload = () => {
    try{
      let rows, sheets = null;
      if (isXlsx){
        const wb = XLSX.read(new Uint8Array(reader.result), {type:'array'});
        sheets = {};
        let best = [];
        for (const name of wb.SheetNames){
          const r = XLSX.utils.sheet_to_json(wb.Sheets[name], {header:1, raw:false, defval:''})
            .map(row => (row || []).map(c => String(c ?? '')));
          sheets[name] = r;
          if (r.length > best.length) best = r;
        }
        rows = best;
      } else {
        rows = parseCSV(reader.result);
      }
      if (!rows.length) throw new Error('prázdný soubor');
      impPrepare(rows, sheets);
    }catch(e){
      body.innerHTML = '<div class="small down">Soubor se nepodařilo přečíst: ' + esc(e.message || e) + '</div>';
    }
  };
  if (isXlsx) reader.readAsArrayBuffer(file); else reader.readAsText(file);
}

function parseCSV(text){
  text = String(text).replace(/^\uFEFF/, '');
  const sample = text.slice(0, 5000);
  const delim = [';', '\t', ','].map(d => ({
    d, n: (sample.match(new RegExp(d === '\t' ? '\\t' : '\\' + d, 'g')) || []).length
  })).sort((a,b) => b.n - a.n)[0].d;

  const rows = []; let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++){
    const ch = text[i];
    if (inQ){
      if (ch === '"'){ if (text[i+1] === '"'){ cell += '"'; i++; } else inQ = false; }
      else cell += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === delim){ row.push(cell); cell = ''; }
      else if (ch === '\n' || ch === '\r'){
        if (ch === '\r' && text[i+1] === '\n') i++;
        row.push(cell); cell = '';
        if (row.some(c => c.trim() !== '')) rows.push(row);
        row = [];
      } else cell += ch;
    }
  }
  row.push(cell);
  if (row.some(c => c.trim() !== '')) rows.push(row);
  return rows;
}

// Rozpozná XTB export (XLSX se listy "Cash Operations" / "Closed Positions").
// Vrací hotové transakce, nebo null když to není XTB.
function tryParseXTB(sheets){
  if (!sheets) return null;
  // Najdi list Cash Operations (case-insensitive)
  const cashName = Object.keys(sheets).find(n => n.toLowerCase().includes('cash operation'));
  if (!cashName) return null;
  const rows = sheets[cashName];

  // Najdi hlavičku s "Type, Ticker, ... Comment"
  let hi = -1;
  for (let i = 0; i < Math.min(rows.length, 15); i++){
    const j = rows[i].join('|').toLowerCase();
    if (j.includes('type') && j.includes('ticker') && j.includes('comment')){ hi = i; break; }
  }
  if (hi < 0) return null;
  const head = rows[hi].map(h => h.toLowerCase().trim());
  const cType = head.indexOf('type');
  const cTicker = head.indexOf('ticker');
  const cTime = head.indexOf('time');
  const cComment = head.indexOf('comment');
  const cInstr = head.indexOf('instrument');

  // Z komentáře "OPEN BUY 0.0751 @ 1708.00" / "CLOSE BUY 16/16.5 @ 683.89"
  const parseComment = (comment) => {
    if (!comment) return null;
    const s = String(comment);
    let kind = null;
    if (/OPEN\s+BUY/i.test(s)) kind = 'buy';
    else if (/CLOSE\s+BUY/i.test(s)) kind = 'sell';
    else return null;
    const m = s.match(/BUY\s+([\d.]+)(?:\/[\d.]+)?\s*@\s*([\d.]+)/i);
    if (!m) return null;
    return { kind, qty: parseFloat(m[1]), price: parseFloat(m[2]) };
  };

  const out = [];
  for (let i = hi + 1; i < rows.length; i++){
    const r = rows[i];
    const type = String(r[cType] || '').toLowerCase();
    if (!type.includes('stock')) continue;   // jen nákupy/prodeje akcií
    const ticker = String(r[cTicker] || '').trim();
    if (!ticker) continue;
    const parsed = parseComment(r[cComment]);
    if (!parsed) continue;
    const date = parseAnyDate(r[cTime]);
    if (!date || !parsed.qty || parsed.price == null) continue;
    out.push({ symbol: ticker, kind: parsed.kind, date, qty: parsed.qty,
      price: parsed.price, fee: 0, cur: 'USD',
      name: cInstr >= 0 ? String(r[cInstr] || '').trim() : null });
  }
  return out.length ? out : null;
}

// Rozpozná Revolut „konsolidovaný výpis" – dlouhý dokument s více tabulkami.
// Vrací rovnou hotové transakce, nebo null když to není tenhle formát.
function tryParseRevolutConsolidated(rows){
  // Najdi řádek, kde je text typický pro Revolut konsolidovaný výpis
  const flat = rows.slice(0, 5).map(r => r.join(' ').toLowerCase()).join(' ');
  const looksRevolut = rows.some(r => {
    const j = r.join('|').toLowerCase();
    return j.includes('popis a symbol') || j.includes('běžné účty souhrny') || j.includes('hodnota vkladu');
  });
  if (!looksRevolut) return null;

  // Z buňky "US$10,785.96 (225,757.15 CZK)" vytáhni částku v první (původní) měně a její kód
  const parseMoneyCell = (cell) => {
    if (!cell) return {amount:null, cur:null};
    const s = String(cell);
    // měna podle symbolu/kódu
    let cur = null;
    if (/US\$|USD/i.test(s)) cur = 'USD';
    else if (/€|EUR/i.test(s)) cur = 'EUR';
    else if (/£|GBP/i.test(s)) cur = 'GBP';
    else if (/CZK|Kč/i.test(s)) cur = 'CZK';
    // první číslo (před případnou závorkou) – formát US$10,785.96
    const m = s.match(/[\d][\d,.\s]*\d|\d/);
    if (!m) return {amount:null, cur};
    let n = m[0].replace(/\s/g,'');
    // americký formát s čárkou jako oddělovačem tisíců a tečkou desetinnou
    if (n.includes(',') && n.includes('.')) n = n.replace(/,/g,'');
    else if (n.includes(',') && !n.includes('.')) n = n.replace(/,/g,'.'); // evropský
    const v = parseFloat(n);
    return {amount: isFinite(v) ? v : null, cur};
  };

  const out = [];
  let i = 0;
  // Řádek ukončuje tabulku, když je to oddělovač, prázdný, nový nadpis sekce,
  // nebo souhrnový řádek "Celkem".
  const isTableEnd = (r, symIdx) => {
    const first = (r[0]||'').trim();
    const sym = (r[symIdx]||'').trim();
    if (first === '' || first.startsWith('---')) return true;
    if (sym.toLowerCase() === 'celkem' || first.toLowerCase() === 'celkem') return true;
    // nový nadpis sekce: první buňka má text, ale ostatní (symbol/hodnota) jsou prázdné
    const filled = r.filter(c => String(c).trim() !== '').length;
    if (filled <= 1) return true;
    return false;
  };

  while (i < rows.length){
    const cells = rows[i].map(c => String(c).trim());
    const joined = cells.join('|').toLowerCase();

    // --- Tabulka NÁKUPŮ akcií: "Datum, Popis a symbol, ISIN, Množství, Země, Hrubá hodnota, ..." ---
    if (cells[0] && cells[0].toLowerCase() === 'datum'
        && joined.includes('popis a symbol') && joined.includes('množství') && joined.includes('hrubá hodnota')){
      const cDate=0, cSym=1, cQty=3;
      const cVal = cells.findIndex(c => c.toLowerCase().includes('hrubá hodnota'));
      const cFee = cells.findIndex(c => c.toLowerCase() === 'poplatky');
      i++;
      while (i < rows.length){
        const r = rows[i].map(c => String(c).trim());
        if (isTableEnd(r, cSym)) break;
        if (/^[A-Z.]+$/.test(r[cSym])){
          const qty = num(r[cQty]);
          const val = parseMoneyCell(r[cVal]);
          const fee = parseMoneyCell(r[cFee]);
          const date = parseAnyDate(r[cDate]);
          if (qty && val.amount != null && date){
            out.push({symbol:r[cSym], kind:'buy', date, qty,
              price: val.amount/qty, fee: fee.amount||0, cur: val.cur||'USD'});
          }
        }
        i++;
      }
      continue;
    }

    // --- Tabulka PRODEJŮ akcií: "Datum (prodeje, nákupu), Popis, symbol a ISIN, ..., Units sold, ..." ---
    if (joined.includes('prodeje, nákupu') && (joined.includes('units sold') || joined.includes('prodané kusy'))
        && joined.includes(' isin')){
      const cSym = cells.findIndex(c => c.toLowerCase().includes('symbol'));
      const cQty = cells.findIndex(c => c.toLowerCase().includes('units sold') || c.toLowerCase().includes('prodané'));
      const cVal = cells.findIndex(c => c.toLowerCase().includes('hodnota'));
      const cFee = cells.findIndex(c => c.toLowerCase() === 'poplatky');
      i++;
      while (i < rows.length){
        const r = rows[i].map(c => String(c).trim());
        if (isTableEnd(r, cSym)) break;
        // symbol je v "Apple AAPL (US0378...)" – vezmi část před závorkou a z ní poslední zkratku
        const beforeParen = (r[cSym]||'').split('(')[0];
        const matches = beforeParen.match(/\b[A-Z][A-Z0-9.]{0,5}\b/g);
        const sym = matches ? matches[matches.length-1] : null;
        const qty = num(r[cQty]);
        const val = parseMoneyCell(r[cVal]);
        const date = parseAnyDate(r[0]);   // datum prodeje je první z dvojice
        if (sym && qty && val.amount != null && date){
          out.push({symbol:sym, kind:'sell', date, qty,
            price: val.amount/qty, fee:(parseMoneyCell(r[cFee]).amount)||0, cur: val.cur||'USD'});
        }
        i++;
      }
      continue;
    }

    i++;
  }

  return out.length ? out : null;
}

function impPrepare(allRows, sheets){
  // Zkus XTB (XLSX s listem Cash Operations)
  const xtb = tryParseXTB(sheets);
  if (xtb){
    imp = { brokerTxs: xtb, broker: 'XTB', headers: [], rows: [], map: {} };
    impRender();
    return;
  }

  // Zkus Revolut konsolidovaný formát
  const rev = tryParseRevolutConsolidated(allRows);
  if (rev){
    imp = { brokerTxs: rev, broker: 'Revolut', headers: [], rows: [], map: {} };
    impRender();
    return;
  }

  // Jinak: najdi řádek s hlavičkami (běžné tabulkové exporty)
  const allKeys = Object.values(HKEYS).flat();
  let best = {score: 0, idx: 0};
  for (let i = 0; i < Math.min(allRows.length, 30); i++){
    const score = allRows[i].reduce((s, c) => {
      const lc = String(c).toLowerCase();
      return s + (lc && allKeys.some(k => lc.includes(k)) ? 1 : 0);
    }, 0);
    if (score > best.score) best = {score, idx: i};
  }
  if (best.score < 2){
    document.getElementById('impBody').innerHTML =
      '<div class="small down">V souboru se nepodařilo najít hlavičky tabulky (Symbol, Množství, Cena…). Zkontroluj, že exportuješ výpis obchodů/pozic.</div>';
    return;
  }
  const headers = allRows[best.idx].map(h => String(h).trim());
  imp = { headers, rows: allRows.slice(best.idx + 1), map: autoMap(headers) };
  impRender();
}

// Spočítá čisté množství po symbolech (nákupy - prodeje), aby šlo poznat aktivní pozice
function netQtyBySymbol(txs){
  const net = {};
  for (const t of txs){
    const ys = yahooGuess(t.symbol);
    net[ys] = (net[ys] || 0) + (t.kind === 'buy' ? t.qty : -t.qty);
  }
  return net;
}

function autoMap(headers){
  const low = headers.map(h => h.toLowerCase());
  const used = new Set(); const map = {};
  for (const role of ['symbol','type','qty','date','fee','cur','cprice','cdate','price']){
    outer:
    for (const key of HKEYS[role]){
      for (let i = 0; i < low.length; i++){
        if (!used.has(i) && low[i].includes(key)){ map[role] = i; used.add(i); break outer; }
      }
    }
  }
  return map;
}

function num(s){
  if (s == null) return null;
  s = String(s).replace(/\s/g, '').replace(/[^\d,.\-]/g, '');
  if (!s) return null;
  const lc = s.lastIndexOf(','), ld = s.lastIndexOf('.');
  if (lc >= 0 && ld >= 0){
    if (lc > ld) s = s.replace(/\./g, '').replace(',', '.');   // 1.234,56
    else s = s.replace(/,/g, '');                              // 1,234.56
  } else if (lc >= 0){
    const commas = (s.match(/,/g) || []).length;
    s = commas > 1 ? s.replace(/,/g, '') : s.replace(',', '.');
  }
  const v = parseFloat(s);
  return isFinite(v) ? v : null;
}

function parseAnyDate(s){
  if (!s) return null;
  s = String(s).trim();
  if (/^\d+(\.\d+)?$/.test(s)){           // Excel sériové číslo data
    const n = parseFloat(s);
    if (n > 20000 && n < 80000) return Math.round((n - 25569) * 86400000);
  }
  let m = s.match(/^(\d{1,2})\.\s*(\d{1,2})\.\s*(\d{4})(?:[ T](\d{1,2}):(\d{2}))?/);   // 31.12.2024 i "6. 11. 2025"
  if (m) return new Date(+m[3], +m[2]-1, +m[1], +(m[4]||0), +(m[5]||0)).getTime();
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);                                   // 2024-12-31 / ISO
  if (m){ const d = new Date(s); return isNaN(d) ? new Date(+m[1], +m[2]-1, +m[3]).getTime() : d.getTime(); }
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);                               // 12/31/24
  if (m){ let y = +m[3]; if (y < 100) y += 2000; return new Date(y, +m[1]-1, +m[2]).getTime(); }
  const d = new Date(s);
  return isNaN(d) ? null : d.getTime();
}

function normKind(t){
  t = String(t).toLowerCase();
  if (/(buy|nákup|nakup|koup)/.test(t)) return 'buy';
  if (/(sell|prodej|prod)/.test(t)) return 'sell';
  return null;
}

// Převod symbolů brokera na Yahoo formát (hlavně přípony burz u XTB)
function yahooGuess(s){
  s = String(s).toUpperCase().trim();
  const map = { '.UK':'.L', '.US':'', '.PL':'.WA', '.CZ':'.PR', '.NL':'.AS', '.FR':'.PA',
    '.IT':'.MI', '.ES':'.MC', '.CH':'.SW', '.SE':'.ST', '.NO':'.OL', '.DK':'.CO',
    '.PT':'.LS', '.BE':'.BR', '.AT':'.VI', '.FI':'.HE' };
  for (const k in map) if (s.endsWith(k)) return s.slice(0, -k.length) + map[k];
  return s;
}

// Známá ETF: kořen tickeru → hezký název. Pomáhá poznat typ a pojmenovat i bez Yahoo.
const KNOWN_ETF = {
  CSPX:'iShares Core S&P 500', SXR8:'iShares Core S&P 500', VUSA:'Vanguard S&P 500',
  VUAA:'Vanguard S&P 500 (Acc)', CNDX:'iShares Nasdaq 100', SXRV:'iShares Nasdaq 100',
  EQQQ:'Invesco Nasdaq 100', VWRA:'Vanguard FTSE All-World (Acc)', VWCE:'Vanguard FTSE All-World',
  VWRL:'Vanguard FTSE All-World', IWDA:'iShares Core MSCI World', SWDA:'iShares Core MSCI World',
  EUNL:'iShares Core MSCI World', VHVE:'Vanguard FTSE Dev. World', ZPRV:'SPDR MSCI USA Small Cap',
  ZPRX:'SPDR MSCI Europe Small Cap', ICHN:'iShares MSCI China', FXC:'iShares China Large Cap',
  IEMA:'iShares Core MSCI EM', EIMI:'iShares Core MSCI EM IMI', VFEA:'Vanguard FTSE EM',
  AGGH:'iShares Core Global Aggregate Bond', VWCG:'Vanguard Global Bond', SGLN:'iShares Physical Gold',
  IGLN:'iShares Physical Gold', VAGS:'Vanguard Global Aggregate Bond'
};
function etfRoot(symbol){ return String(symbol||'').toUpperCase().split('.')[0]; }

// Vrátí {type, name} pro symbol – nejdřív lokální znalost (ETF/krypto), pak fallback
function assetInfo(symbol, fallbackName){
  const root = etfRoot(symbol);
  if (KNOWN_ETF[root]) return { type:'ETF', name: KNOWN_ETF[root] };
  if (String(symbol).includes('-USD') || /^(BTC|ETH|SOL|ADA|XRP|DOGE|DOT|LTC|BNB|AVAX|MATIC)$/.test(root))
    return { type:'Krypto', name: fallbackName || root };
  return { type:'Akcie', name: fallbackName || symbol };
}


function isDupTx(ysym, tx){
  const h = state.holdings.find(x => x.symbol === ysym);
  if (!h) return false;
  return h.txs.some(t => t.kind === tx.kind
    && Math.abs(t.qty - tx.qty) < 1e-6
    && Math.abs(t.price - tx.price) < 0.01
    && new Date(t.date).toDateString() === new Date(tx.date).toDateString());
}

function impParseRows(){
  // Broker formát (XTB / Revolut) – transakce už jsou hotové
  if (imp.brokerTxs){
    const net = netQtyBySymbol(imp.brokerTxs);
    let id = 0;
    return imp.brokerTxs.map(t => {
      const ysym = yahooGuess(t.symbol);
      const tx = {symbol:t.symbol, cur:t.cur, kind:t.kind, date:t.date,
        qty:t.qty, price:t.price, fee:t.fee||0, id:'r'+(id++), srcName:t.name||null};
      tx.dup = isDupTx(ysym, tx);
      tx.activeSymbol = (net[ysym] || 0) > 1e-6;  // patří k aktuálně držené pozici?
      return tx;
    });
  }

  const m = imp.map; const out = []; let id = 0;
  for (const r of imp.rows){
    const get = role => (m[role] != null) ? String(r[m[role]] ?? '').trim() : '';
    const sym = get('symbol').toUpperCase();
    if (!sym) continue;
    const typeRaw = get('type');
    const kind = (m.type != null) ? normKind(typeRaw) : 'buy';
    const qty = num(get('qty'));
    const price = num(get('price'));
    const date = parseAnyDate(get('date'));
    const fee = num(get('fee')) || 0;
    const cur = (get('cur').toUpperCase().match(/[A-Z]{3}/) || [null])[0];
    const base = {symbol: sym, cur, typeRaw};

    if (kind === null){
      out.push({...base, id:'r'+(id++), reason: 'není nákup/prodej („' + typeRaw + '“)', date, qty, price});
      continue;
    }
    if (!qty || price == null || !date){
      out.push({...base, id:'r'+(id++), reason: 'chybí množství, cena nebo datum', date, qty, price});
      continue;
    }
    const ysym = yahooGuess(sym);
    const t1 = {...base, id:'r'+(id++), kind, date, qty, price, fee};
    t1.dup = isDupTx(ysym, t1);
    out.push(t1);

    // XTB uzavřené pozice: jeden řádek = nákup + prodej
    const cprice = num(get('cprice'));
    const cdate = parseAnyDate(get('cdate'));
    if (kind === 'buy' && cprice != null && cdate){
      const t2 = {...base, id:'r'+(id++), kind:'sell', date:cdate, qty, price:cprice, fee:0};
      t2.dup = isDupTx(ysym, t2);
      out.push(t2);
    }
  }
  return out;
}

let impActiveOnly = true;   // výchozí: nabídnout jen aktivní pozice

function impRender(){
  imp.txs = impParseRows();
  const valid = imp.txs.filter(t => !t.reason);
  const skipped = imp.txs.filter(t => t.reason);
  const isBroker = !!imp.brokerTxs;

  // Aktivní vs uzavřené (jen u broker importu, kde víme čisté množství)
  const active = valid.filter(t => t.activeSymbol);
  const closed = valid.filter(t => !t.activeSymbol);
  const shown = isBroker && impActiveOnly ? active : valid;
  const syms = [...new Set(shown.map(t => t.symbol))];

  // Hlavička podle typu importu
  const headerHTML = isBroker ? `
    <div class="small muted" style="margin:8px 0">
      Rozpoznán výpis <b>${imp.broker}</b> – nalezeno ${valid.length} obchodů
      (${active.length} u aktivních pozic, ${closed.length} u uzavřených).
      ${imp.broker === 'Revolut' ? 'Ceny za kus jsou dopočítané z hodnoty a počtu kusů.' : ''}</div>
    <label style="display:flex; align-items:center; gap:10px; padding:10px; background:var(--card2); border-radius:10px; margin-bottom:8px; cursor:pointer">
      <input type="checkbox" ${impActiveOnly ? 'checked' : ''} onchange="impToggleActive(this.checked)" style="width:auto; margin:0">
      <span class="small">Zobrazit jen <b>aktivní pozice</b> (které stále držíš) – skryje dávno prodané a zrušené tituly</span>
    </label>` : `
    <details style="margin:12px 0">
      <summary class="small" style="cursor:pointer; color:var(--accent); font-weight:600">Mapování sloupců (automaticky rozpoznáno – rozklikni pro úpravu)</summary>
      <div style="margin-top:10px">
        ${Object.keys(ROLE_LABELS).map(role => `
          <label class="f">${ROLE_LABELS[role]}</label>
          <select onchange="impSetMap('${role}', this.value)">
            <option value="">– nepoužito –</option>
            ${imp.headers.map((h, i) => `<option value="${i}" ${imp.map[role] === i ? 'selected' : ''}>${esc(h) || '(sloupec ' + (i+1) + ')'}</option>`).join('')}
          </select>`).join('')}
      </div>
    </details>`;

  const symMapHTML = syms.length ? `
    <div class="card" style="margin:12px 0; padding:12px">
      <div class="small" style="font-weight:700; margin-bottom:8px">Symboly pro Yahoo Finance (zkontroluj/uprav)</div>
      ${syms.map(s => `
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px">
          <span class="small num" style="width:90px; flex-shrink:0">${esc(s)}</span>
          <input data-symmap="${esc(s)}" value="${esc(yahooGuess(s))}" style="margin:0; padding:8px"
            autocapitalize="characters" autocomplete="off">
        </div>`).join('')}
      <div class="tiny muted">Přípony burz se převádí automaticky (.UK→.L, .US→nic, .CZ→.PR…). Pokud si nejsi jistý, ověř symbol vyhledáváním v záložce Portfolio.</div>
    </div>` : '';

  const txRow = (t) => `
      <label style="display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); cursor:pointer">
        <input type="checkbox" id="imp-${t.id}" ${t.dup ? '' : 'checked'} style="width:auto; margin:0">
        <div style="flex:1; min-width:0">
          <div class="small"><b>${esc(t.symbol)}</b> · ${t.kind === 'buy' ? '🔵 nákup' : '🟠 prodej'}
            <span class="num">${fmtQty(t.qty)} ks × ${t.price}${t.cur ? ' ' + t.cur : ''}</span></div>
          <div class="tiny muted">${fmtDate(t.date)}${t.fee ? ' · poplatek ' + t.fee : ''}${t.dup ? ' · <span class="down">duplicitní – už je v aplikaci</span>' : ''}</div>
        </div>
      </label>`;

  const listHTML = `
    <div style="display:flex; gap:8px; margin:10px 0">
      <button class="btn ghost" style="padding:8px; font-size:13px" onclick="impCheckAll(true)">Vybrat vše</button>
      <button class="btn ghost" style="padding:8px; font-size:13px" onclick="impCheckAll(false)">Zrušit výběr</button>
    </div>
    ${shown.map(txRow).join('')}
    ${(isBroker && impActiveOnly && closed.length) ? `
      <div class="tiny muted" style="margin-top:10px; padding:8px; background:var(--card2); border-radius:8px">
        Skryto ${closed.length} transakcí u ${[...new Set(closed.map(t=>t.symbol))].length} uzavřených pozic. Zobraz je vypnutím „jen aktivní pozice" výše.</div>` : ''}
    ${skipped.length ? `
      <details style="margin-top:10px">
        <summary class="tiny muted" style="cursor:pointer">Přeskočené řádky (${skipped.length}) – dividendy, vklady, neúplné…</summary>
        ${skipped.slice(0, 40).map(t => `
          <div class="tiny muted" style="padding:5px 0; border-bottom:1px solid var(--line)">
            ${esc(t.symbol)} – ${esc(t.reason)}</div>`).join('')}
      </details>` : ''}`;

  document.getElementById('impBody').innerHTML = headerHTML + symMapHTML +
    (shown.length
      ? listHTML + `<button class="btn primary" id="impGo" style="margin-top:14px"
          onclick="impDoImport()">Importovat vybrané transakce</button>`
      : '<div class="small down" style="margin-top:10px">Nenašel jsem žádné importovatelné obchody.</div>');
}

function impToggleActive(on){ impActiveOnly = on; impRender(); }

function impSetMap(role, v){
  imp.map[role] = v === '' ? null : parseInt(v);
  impRender();
}
function impCheckAll(on){
  imp.txs.filter(t => !t.reason).forEach(t => {
    const el = document.getElementById('imp-' + t.id);
    if (el) el.checked = on;
  });
}

async function impDoImport(){
  const symMap = {};
  document.querySelectorAll('[data-symmap]').forEach(i => {
    symMap[i.dataset.symmap] = i.value.trim().toUpperCase();
  });
  const chosen = imp.txs.filter(t => !t.reason && document.getElementById('imp-' + t.id)?.checked);
  if (!chosen.length){ toast('Nevybral jsi žádné transakce'); return; }

  const btn = document.getElementById('impGo');
  btn.disabled = true; btn.textContent = 'Importuji…';

  let added = 0;
  for (const t of chosen){
    const ysym = symMap[t.symbol] || yahooGuess(t.symbol);
    if (!ysym) continue;
    let h = state.holdings.find(x => x.symbol === ysym);
    if (!h){
      // Nejdřív lokální znalost (funguje i bez Yahoo): ETF tabulka, krypto, název z výpisu
      const info = assetInfo(ysym, t.srcName);
      let cur = t.cur || 'USD', name = info.name, type = info.type;
      // Yahoo jako doplněk – upřesní měnu a případně název/typ, když je dostupné
      try{ const q = await fetchQuote(ysym); cur = q.currency; quotes[ysym] = q; }catch(e){}
      if (type === 'Akcie' && !KNOWN_ETF[etfRoot(ysym)]){
        try{
          const sr = await fetchSearch(ysym);
          const hit = sr.find(x => x.symbol === ysym) || sr[0];
          if (hit){
            if (hit.quoteType === 'ETF') type = 'ETF';
            else if (hit.quoteType === 'CRYPTOCURRENCY') type = 'Krypto';
            if (!t.srcName && hit.name) name = hit.name;
          }
        }catch(e){}
      }
      h = {id: uid(), symbol: ysym, name, currency: cur, type, txs: []};
      state.holdings.push(h);
    }
    h.txs.push({id: uid(), kind: t.kind, date: t.date, qty: t.qty, price: t.price, fee: t.fee || 0});
    added++;
  }
  save(); closeModal(); render();
  await refreshAll();
  toast('Importováno ' + added + ' transakcí ✓');
}

/* =========================================================
   BIOMETRICKÝ ZÁMEK (Face ID / Touch ID přes WebAuthn)
========================================================= */
// Pozn.: PWA na iOS nemá přímé API na Face ID. Použijeme WebAuthn –
// při zapnutí se vytvoří „passkey" navázaná na zařízení, kterou iOS odemkne
// pomocí Face ID / Touch ID. Klíč i ID se ukládají jen lokálně.
const LOCK_KEY = 'mojeportfolio-lock';
function lockConfig(){
  try{ return JSON.parse(localStorage.getItem(LOCK_KEY)) || {}; }catch(e){ return {}; }
}
function setLockConfig(c){ localStorage.setItem(LOCK_KEY, JSON.stringify(c)); }
const b64ToBuf = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
const bufToB64 = b => btoa(String.fromCharCode(...new Uint8Array(b)));

async function enableBiometric(){
  if (!window.PublicKeyCredential){ toast('Zařízení nepodporuje biometrický zámek'); return false; }
  try{
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const userId = crypto.getRandomValues(new Uint8Array(16));
    const cred = await navigator.credentials.create({ publicKey:{
      challenge, rp:{name:'Moje Portfolio'},
      user:{id:userId, name:'portfolio', displayName:'Moje Portfolio'},
      pubKeyCredParams:[{type:'public-key', alg:-7},{type:'public-key', alg:-257}],
      authenticatorSelection:{ userVerification:'required', residentKey:'preferred' },
      timeout:60000
    }});
    setLockConfig({ enabled:true, credId: bufToB64(cred.rawId) });
    return true;
  }catch(e){ toast('Nastavení zámku se nezdařilo'); return false; }
}

async function verifyBiometric(){
  const cfg = lockConfig();
  if (!cfg.enabled) return true;
  try{
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const opts = { challenge, timeout:60000, userVerification:'required' };
    if (cfg.credId) opts.allowCredentials = [{ type:'public-key', id: b64ToBuf(cfg.credId) }];
    await navigator.credentials.get({ publicKey: opts });
    return true;
  }catch(e){ return false; }
}

function showLockScreen(){
  const el = document.createElement('div');
  el.className = 'lock'; el.id = 'lockScreen';
  el.innerHTML = `<div class="icon">🔒</div>
    <h2>Portfolio je uzamčeno</h2>
    <p>Pro přístup ověř svou identitu pomocí Face ID nebo otisku prstu.</p>
    <button class="btn primary" style="max-width:260px" id="unlockBtn">Odemknout</button>`;
  document.body.appendChild(el);
  const tryUnlock = async () => {
    if (await verifyBiometric()){ el.remove(); }
    else toast('Ověření se nezdařilo, zkus to znovu');
  };
  document.getElementById('unlockBtn').onclick = tryUnlock;
  tryUnlock();
}

/* =========================================================
   START + AUTO-REFRESH
========================================================= */
async function start(){
  if (lockConfig().enabled){
    showLockScreen();
  }
  render();
  await refreshAll();
  refreshDividends();
}
start();
// Auto-refresh každé 3 minuty – pro sledování portfolia dostačuje a šetří Yahoo
setInterval(() => { if (!document.hidden) refreshAll(); }, 180000);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden){
    // Obnov při návratu, ale ne víc než jednou za 60 s (ochrana proti blokaci)
    if (!lastRefresh || Date.now() - lastRefresh.getTime() > 60000) refreshAll();
    if (lockConfig().enabled && !document.getElementById('lockScreen')) showLockScreen();
  }
});
</script>
